<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedido Confirmado | Bella Massa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="header">
    <div class="header__inner container">
      <a href="index.html" class="header__logo">
        <span class="logo__icon"><i class="fas fa-wheat-awn"></i></span>
        <div class="logo__text">
          <span class="logo__name">Bella Massa</span>
          <span class="logo__tagline">Padaria Artesanal</span>
        </div>
      </a>
      <nav class="header__nav">
        <ul class="nav__list">
          <li><a href="index.html"    class="nav__link">Início</a></li>
          <li><a href="cardapio.html" class="nav__link">Cardápio</a></li>
          <li><a href="sobre.html"    class="nav__link">Sobre</a></li>
          <li><a href="contato.html"  class="nav__link">Contato</a></li>
        </ul>
      </nav>
      <div class="header__actions">
        <button class="hamburger" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="page-content confirmado">
    <div class="container">
      <div class="confirmado__card reveal revealed">

        <div class="confirmado__icon">
          <i class="fas fa-check"></i>
        </div>

        <h1 class="confirmado__title">Pedido confirmado!</h1>
        <p class="confirmado__subtitle" id="confirmMsg">
          Seu pedido foi recebido com sucesso.<br>
          Em breve entraremos em contato via WhatsApp para confirmar.
        </p>

        <div class="confirmado__info" id="confirmInfo"></div>

        <div class="confirmado__actions" id="confirmActions">
          <a id="btnAcompanhar" href="acompanhar-pedido.html" class="btn btn--primary btn--lg btn--block" style="text-decoration:none;display:none;align-items:center;justify-content:center;gap:.5em;padding:.9em;">
            <i class="fas fa-magnifying-glass"></i> Acompanhar meu pedido
          </a>
          <a href="cardapio.html" class="btn btn--ghost btn--block" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5em;padding:.85em;">
            <i class="fas fa-bag-shopping"></i> Continuar comprando
          </a>
          <a href="index.html" style="display:flex;align-items:center;justify-content:center;gap:.4em;font-size:.85rem;color:var(--clr-text-muted);text-decoration:none;margin-top:.25rem;transition:color .2s;">
            <i class="fas fa-house"></i> Voltar ao início
          </a>
        </div>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__bottom" style="border-top:1px solid var(--clr-border-light);">
      <div class="footer__bottom-inner container">
        <p>&copy; <span id="footerYear"></span> Bella Massa. Todos os direitos reservados.</p>
      </div>
    </div>
  </footer>

  <script type="module" src="js/firebase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const mpStatus  = urlParams.get('status');
      const orderId   = urlParams.get('orderId');

      const iconEl    = document.querySelector('.confirmado__icon i');
      const titleEl   = document.querySelector('.confirmado__title');
      const msgEl     = document.getElementById('confirmMsg');
      const btnAcomp  = document.getElementById('btnAcompanhar');

      // Failure
      if (mpStatus === 'failure') {
        if (iconEl)  { iconEl.className = 'fas fa-times-circle'; iconEl.style.color = '#e53e3e'; }
        if (titleEl) titleEl.textContent = 'Pagamento não aprovado';
        if (msgEl)   msgEl.innerHTML = 'Seu pagamento não foi concluído.<br>Tente novamente com outro método de pagamento.';
        return;
      }

      // Pending
      if (mpStatus === 'pending') {
        if (iconEl)  { iconEl.className = 'fas fa-clock'; iconEl.style.color = '#d4a040'; }
        if (titleEl) titleEl.textContent = 'Pagamento em análise';
        if (msgEl)   msgEl.innerHTML = 'Seu pagamento está sendo validado.<br>Você receberá a confirmação em breve.';
      }

      // Dados do pedido no sessionStorage
      const raw = sessionStorage.getItem('bm_last_order');
      if (!raw) return;
      const order = JSON.parse(raw);
      const info  = document.getElementById('confirmInfo');

      const isDelivery = order.delivery === 'delivery';
      const payLabels  = { pix: 'Pix', dinheiro: 'Dinheiro', cartao: 'Cartão' };
      const pid = orderId || order.orderId;

      // Success / PIX aprovado
      if (mpStatus === 'success' || !mpStatus) {
        if (order.payment === 'pix') {
          if (iconEl)  { iconEl.className = 'fas fa-circle-check'; iconEl.style.color = '#2d7a3a'; }
          if (titleEl) titleEl.textContent = 'Pagamento PIX aprovado!';
          msgEl.innerHTML = `Olá, <strong>${order.name}</strong>! Seu PIX foi confirmado.<br>Seu pedido já está sendo preparado. 🎉`;
        } else {
          msgEl.innerHTML = `Olá, <strong>${order.name}</strong>! Seu pedido foi recebido com sucesso.<br>Entraremos em contato em breve para confirmar.`;
        }
      }

      // Mostrar botão acompanhar se tiver orderId
      if (btnAcomp && pid) {
        btnAcomp.href = `acompanhar-pedido.html?orderId=${pid}`;
        btnAcomp.style.display = 'flex';
      }

      info.innerHTML = `
        <div class="confirmado__info-row">
          <i class="fas fa-hashtag"></i>
          <span>Pedido <strong>#${order.numero || '—'}</strong></span>
        </div>
        <div class="confirmado__info-row">
          <i class="fas fa-user"></i>
          <span>${order.name} &mdash; ${order.phone}</span>
        </div>
        ${isDelivery ? `
        <div class="confirmado__info-row">
          <i class="fas fa-location-dot"></i>
          <span>${order.address}, ${order.neighborhood} &mdash; ${order.city}</span>
        </div>` : `
        <div class="confirmado__info-row">
          <i class="fas fa-store"></i>
          <span>Retirada na loja</span>
        </div>`}
        <div class="confirmado__info-row">
          <i class="fas fa-credit-card"></i>
          <span>Pagamento: <strong>${payLabels[order.payment] || order.payment}</strong></span>
        </div>
        <div class="confirmado__info-row">
          <i class="fas fa-brazilian-real-sign"></i>
          <span>Total: <strong>${order.total}</strong></span>
        </div>
      `;
    });
  </script>
</body>
</html>
